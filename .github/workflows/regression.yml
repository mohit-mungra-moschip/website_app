name: AI Regression Pipeline

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [test-repo-push]   # triggered when website_tests pushes to main
  schedule:
    - cron: '0 0 * * *'       # daily at midnight UTC
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - test_api.py
          - test_contact.py
          - test_home.py

      enable_self_healing:
        description: 'Enable AI Self-Healing'
        required: true
        default: true
        type: boolean
      create_jira_tickets:
        description: 'Create Jira tickets (healed + unhealed + env)'
        required: true
        default: true
        type: boolean
      max_healing_iterations:
        description: 'Max iterations (1-5)'
        required: false
        default: '3'
        type: string
      monorepo_mode:
        description: 'Monorepo mode — app + tests in same repo (skips test repo checkout)'
        required: false
        default: false
        type: boolean
      test_repo:
        description: 'Test repository (only used when monorepo_mode is false)'
        required: false
        default: 'mohit-mungra-moschip/website_tests'
        type: string

jobs:
  regression:
    name: Regression + AI Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      REGRESSION_RUN_ID: ${{ github.run_id }}
      REGRESSION_RUN_STAMP: ${{ github.run_id }}
    permissions:
      contents: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: regression_ai
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      # ── Checkout App Repo ───────────────────────────────────────────────────
      - name: Checkout App Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      # ── Checkout Test Repo (skipped in monorepo mode) ─────────────────────
      - name: Checkout Test Repository
        if: ${{ inputs.monorepo_mode != true }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.test_repo || 'mohit-mungra-moschip/agentic_pipeline_tests' }}
          token: ${{ secrets.TEST_REPO_TOKEN }}
          path: test_framework
          fetch-depth: 20

      # ── Python Setup ────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ${{ inputs.monorepo_mode == true && 'requirements.txt' || 'test_framework/requirements.txt' }}

      - name: Install Dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          # In monorepo mode requirements.txt is at root; otherwise inside test_framework/
          if [ "${{ inputs.monorepo_mode }}" = "true" ]; then
            REQ_FILE="requirements.txt"
          else
            REQ_FILE="test_framework/requirements.txt"
          fi
          pip install -r "$REQ_FILE"
          pip install pytest-json-report

      # ── Database Setup ──────────────────────────────────────────────────────
      - name: Setup Database
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/regression_ai
        run: |
          source .venv/bin/activate
          # Initialize database tables
          python -c "import asyncio; from app.database import engine, Base; exec('async def init():\n    async with engine.begin() as conn:\n        await conn.run_sync(Base.metadata.create_all)\nasyncio.run(init())')" || true

      # ── Execute Tests ───────────────────────────────────────────────────────
      - name: Execute Regression Tests
        id: run_tests
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: |
          source .venv/bin/activate
          # Clean all __pycache__ and .pyc files before execution
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          mkdir -p reports
          
          # Set test root based on repo mode
          if [ "${{ inputs.monorepo_mode }}" = "true" ]; then
            TEST_ROOT="tests"
          else
            TEST_ROOT="test_framework/tests"
          fi

          # Resolve test path based on selected scope
          case "${{ inputs.test_scope || 'all' }}" in
            all)                        TEST_PATH="${TEST_ROOT}/" ;;
            test_api.py)                TEST_PATH="${TEST_ROOT}/test_api.py" ;;
            test_contact.py)            TEST_PATH="${TEST_ROOT}/test_contact.py" ;;
            test_home.py)               TEST_PATH="${TEST_ROOT}/test_home.py" ;;
            *)                          TEST_PATH="${TEST_ROOT}/" ;;
          esac

          echo "Mode: ${{ inputs.monorepo_mode == true && 'MONOREPO' || 'DUAL-REPO' }}  |  Test Path: $TEST_PATH"
          pytest "$TEST_PATH" -v --tb=short --json-report --json-report-file=reports/test_results.json 2>&1 | tee reports/raw_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ── Run AI Analysis & Self-Healing ──────────────────────────────────────
      - name: Run AI Regression Analysis Pipeline
        id: ai_pipeline
        env:
          DEFAULT_MODEL: ${{ vars.DEFAULT_MODEL || 'groq/llama-3.3-70b-versatile' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          JIRA_SERVER: ${{ secrets.JIRA_SERVER }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_PASSWORD: ${{ secrets.JIRA_PASSWORD }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY || 'SCRUM' }}
          CI_MODE: "true"
          CREATE_JIRA: ${{ inputs.create_jira_tickets || 'false' }}
          MAX_HEAL_ITER: ${{ inputs.max_healing_iterations || '3' }}
          ENABLE_SELF_HEALING: ${{ inputs.enable_self_healing != false }}
          SELF_HEALING_MODEL: "groq/llama-3.3-70b-versatile"
          ADVANCED_HEALING_MODEL: "groq/llama-3.3-70b-versatile"
          PYTHONPATH: .
          TESTRAIL_ENABLED: "true"
          TESTRAIL_URL: "https://regression.testrail.io/"
          TESTRAIL_EMAIL: "mohit.mungra@moschip.com"
          TESTRAIL_PASSWORD: "MMP@welcome1234"
          TESTRAIL_PROJECT_ID: "3"
          TESTRAIL_SUITE_ID: "7"
        run: |
          source .venv/bin/activate
          # Clean all __pycache__ and .pyc files before execution
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          
          # Set test root and runner path based on repo mode
          if [ "${{ inputs.monorepo_mode }}" = "true" ]; then
            TEST_ROOT="tests"
            RUNNER="regression_runner.py"
          else
            TEST_ROOT="test_framework/tests"
            RUNNER="test_framework/regression_runner.py"
          fi

          # Resolve test path based on selected scope
          case "${{ inputs.test_scope || 'all' }}" in
            all)                        TEST_PATH="${TEST_ROOT}/" ;;
            test_api.py)                TEST_PATH="${TEST_ROOT}/test_api.py" ;;
            test_contact.py)            TEST_PATH="${TEST_ROOT}/test_contact.py" ;;
            test_home.py)               TEST_PATH="${TEST_ROOT}/test_home.py" ;;
            *)                          TEST_PATH="${TEST_ROOT}/" ;;
          esac

          # Run AI regression runner (path differs by mode)
          python "$RUNNER" \
            --project-path "." \
            --test-command "pytest $TEST_PATH" \
            --run-id "${{ github.run_id }}" \
            --ci-mode \
            --max-iter "${{ inputs.max_healing_iterations || '3' }}" \
            --create-jira "${{ inputs.create_jira_tickets != 'false' && 'true' || 'true' }}"
          # Generate dynamic Pull Request descriptions (includes Jira links & healing info)
          python3 pr_body_generator.py
          HEALING_TYPE=$(python3 -c "import json; d=json.load(open('reports/ai_summary.json')); print(d.get('healing_type', 'NONE'))" 2>/dev/null || echo "NONE")
          JIRA_IDS=$(python3 -c "import json; d=json.load(open('reports/ai_summary.json')); healed=[r['jira_id'] for r in d.get('jira_results_healed', []) if r.get('jira_id')]; unhealed=[r['jira_id'] for r in d.get('jira_results', []) if r.get('jira_id')]; print(', '.join(healed + unhealed))" 2>/dev/null || echo "")
          JIRA_IDS_SHORT=$(python3 -c "import json, re; from collections import defaultdict; d=json.load(open('reports/ai_summary.json')); healed=[r['jira_id'] for r in d.get('jira_results_healed', []) if r.get('jira_id')]; unhealed=[r['jira_id'] for r in d.get('jira_results', []) if r.get('jira_id')]; tokens=sorted(list(set(healed+unhealed))); groups=defaultdict(list); [(groups[m.group(1)].append(int(m.group(2))) if (m:=re.match(r'^([a-zA-Z0-9]+-)(\d+)$', t)) else groups[''].append(t)) for t in tokens]; parts=[(f'{p}' + ', '.join(str(n) for n in sorted(groups[p]))) if p else ', '.join(groups[p]) for p in sorted(groups.keys())]; print(', '.join(parts))" 2>/dev/null || echo "")
          echo "healing_type=$HEALING_TYPE" >> $GITHUB_OUTPUT
          echo "jira_ids=$JIRA_IDS"         >> $GITHUB_OUTPUT
          echo "jira_ids_short=$JIRA_IDS_SHORT" >> $GITHUB_OUTPUT

      # ── Create PR for App Changes (If App was healed — APP_HEAL or MIXED) ──
      - name: PR for Application Fixes
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEALING_TYPE="${{ steps.ai_pipeline.outputs.healing_type }}"
          # Only create app PR if healing touched application code
          if [[ "$HEALING_TYPE" == "APP_HEAL" || "$HEALING_TYPE" == "MIXED" ]]; then
            find app/ -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            find app/ -type f -name "*.pyc" -delete 2>/dev/null || true
            CHANGED=$(git diff --name-only | grep -E '(app/.*\.py|requirements\.txt|pyproject\.toml|setup\.py)$' || true)
            if [ -n "$CHANGED" ]; then
              echo "Found healed changes in App code or dependencies ($HEALING_TYPE). Creating branch and PR..."
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"

              HEALING_TYPE="${{ steps.ai_pipeline.outputs.healing_type }}"
              JIRA_IDS="${{ steps.ai_pipeline.outputs.jira_ids }}"

              # Clean Jira IDs for branch naming (replace commas with hyphens and remove spaces)
              JIRA_BRANCH_PREFIX=""
              if [ -n "$JIRA_IDS" ]; then
                JIRA_BRANCH_PREFIX=$(echo "$JIRA_IDS" | tr -d ' ' | tr ',' '-')
                JIRA_BRANCH_PREFIX="${JIRA_BRANCH_PREFIX}-"
              fi

              BRANCH_NAME="${JIRA_BRANCH_PREFIX}ai-fix-app"
              git checkout -b "$BRANCH_NAME"
              git add -u
              # Include Jira IDs in the commit message for traceability + Smart Commit transition
              if [ -n "$JIRA_IDS" ]; then
                JIRA_KEYS_LIST=$(echo "$JIRA_IDS" | tr ',' ' ' | tr -s ' ')
                git commit -m "$JIRA_KEYS_LIST #in-review #comment fix(ai): auto-healed application bug [$HEALING_TYPE]"
              else
                git commit -m "fix(ai): auto-healed application bug [$HEALING_TYPE]"
              fi
              git push --force origin "$BRANCH_NAME"

              # Build PR title with Jira IDs
              JIRA_IDS="${{ steps.ai_pipeline.outputs.jira_ids }}"
              if [ -n "$JIRA_IDS" ]; then
                PR_TITLE="$JIRA_IDS | [RegressionAI] Auto-Heal: Fix Application Bugs ($HEALING_TYPE)"
              else
                PR_TITLE="[RegressionAI] Auto-Heal: Fix Application Bugs ($HEALING_TYPE)"
              fi

              PR_URL=$(gh pr create \
                --title "$PR_TITLE" \
                --body-file reports/pr_body_app.md \
                --head "$BRANCH_NAME" \
                --base main)
              echo "✅ App PR created: $PR_URL"

              # Programmatically trigger Jira webhook sync by closing and reopening the PR (forces Jira to link)
              PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
              if [ -n "$PR_NUM" ]; then
                echo "🔄 Sleeping 5s before triggering sync..."
                sleep 5
                gh pr close "$PR_NUM"
                gh pr reopen "$PR_NUM"
                echo "✅ Webhook sync triggered successfully."
              fi
              source .venv/bin/activate
              python3 test_framework/utils/report_utils/update_reports_pr.py --pr-url "$PR_URL" --type "APP_HEAL" --run-id "${{ github.run_id }}"
            else
              echo "No healed changes found in App repo."
            fi
          else
            echo "Healing type is '$HEALING_TYPE' — skipping App PR (no app code changes)."
          fi

      # ── Create PR for Test Changes (If Tests were healed — TEST_HEAL or MIXED) ──
      - name: PR for Test Framework Fixes
        if: always()
        env:
          # In monorepo mode use built-in GITHUB_TOKEN; in dual-repo use TEST_REPO_TOKEN
          GITHUB_TOKEN: ${{ inputs.monorepo_mode == true && secrets.GITHUB_TOKEN || secrets.TEST_REPO_TOKEN }}
        run: |
          HEALING_TYPE="${{ steps.ai_pipeline.outputs.healing_type }}"
          MONOREPO="${{ inputs.monorepo_mode }}"

          # Only create test PR if healing touched test code
          if [[ "$HEALING_TYPE" == "TEST_HEAL" || "$HEALING_TYPE" == "MIXED" ]]; then

            # ── Dual-repo mode: cd into the checked-out test_framework folder
            if [ "$MONOREPO" != "true" ]; then
              cd test_framework
              PR_BODY_FILE="../reports/pr_body_tests.md"
              UPDATE_SCRIPT="utils/report_utils/update_reports_pr.py"
              VENV_ACTIVATE="../.venv/bin/activate"
            else
              # ── Monorepo mode: stay in root, tests/ is here
              PR_BODY_FILE="reports/pr_body_tests.md"
              UPDATE_SCRIPT="utils/report_utils/update_reports_pr.py"
              VENV_ACTIVATE=".venv/bin/activate"
            fi

            # Purge __pycache__ so it never appears in the diff
            find tests/ -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            find tests/ -type f -name "*.pyc" -delete 2>/dev/null || true

            # Only open a PR if actual test/config files were modified
            CHANGED=$(git diff --name-only | grep -E '(tests/.*\.py|requirements\.txt|pyproject\.toml|setup\.py)$' || true)
            if [ -n "$CHANGED" ]; then
              echo "Found healed changes in tests ($HEALING_TYPE). Creating branch and PR..."
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"

              JIRA_IDS="${{ steps.ai_pipeline.outputs.jira_ids }}"
              JIRA_BRANCH_PREFIX=""
              if [ -n "$JIRA_IDS" ]; then
                JIRA_BRANCH_PREFIX=$(echo "$JIRA_IDS" | tr -d ' ' | tr ',' '-')
                JIRA_BRANCH_PREFIX="${JIRA_BRANCH_PREFIX}-"
              fi

              BRANCH_NAME="${JIRA_BRANCH_PREFIX}ai-fix-tests"
              git checkout -b "$BRANCH_NAME"
              git add -u

              if [ -n "$JIRA_IDS" ]; then
                JIRA_KEYS_LIST=$(echo "$JIRA_IDS" | tr ',' ' ' | tr -s ' ')
                git commit -m "$JIRA_KEYS_LIST #in-review #comment test(ai): auto-healed test definitions [$HEALING_TYPE]"
              else
                git commit -m "test(ai): auto-healed test definitions [$HEALING_TYPE]"
              fi
              git push --force origin "$BRANCH_NAME"

              if [ -n "$JIRA_IDS" ]; then
                PR_TITLE="$JIRA_IDS | [RegressionAI] Auto-Heal: Fix Test Assertions ($HEALING_TYPE)"
              else
                PR_TITLE="[RegressionAI] Auto-Heal: Fix Test Assertions ($HEALING_TYPE)"
              fi

              # In dual-repo mode, explicitly specify the external repo; in monorepo gh uses current repo
              if [ "$MONOREPO" != "true" ]; then
                TEST_REPO="${{ inputs.test_repo || 'mohit-mungra-moschip/website_tests' }}"
                PR_URL=$(gh pr create \
                  --repo "$TEST_REPO" \
                  --title "$PR_TITLE" \
                  --body-file "$PR_BODY_FILE" \
                  --head "$BRANCH_NAME" \
                  --base main)
              else
                # Monorepo: gh picks up the current repo automatically
                PR_URL=$(gh pr create \
                  --title "$PR_TITLE" \
                  --body-file "$PR_BODY_FILE" \
                  --head "$BRANCH_NAME" \
                  --base main)
              fi
              echo "✅ Test PR created: $PR_URL"

              # Trigger Jira webhook sync
              PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
              if [ -n "$PR_NUM" ]; then
                sleep 5
                if [ "$MONOREPO" != "true" ]; then
                  gh pr close "$PR_NUM" --repo "$TEST_REPO"
                  gh pr reopen "$PR_NUM" --repo "$TEST_REPO"
                else
                  gh pr close "$PR_NUM"
                  gh pr reopen "$PR_NUM"
                fi
                echo "✅ Webhook sync triggered."
              fi

              source "$VENV_ACTIVATE"
              python3 "$UPDATE_SCRIPT" --pr-url "$PR_URL" --type "TEST_HEAL" --run-id "${{ github.run_id }}"
            else
              echo "No healed changes found in test code."
            fi
          else
            echo "Healing type is '$HEALING_TYPE' — skipping Tests PR (no test code changes)."
          fi

      # ── Surface ENV_ISSUE Summary in GitHub Step Summary ───────────────────
      - name: Surface ENV_ISSUE Report
        if: always()
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          summary_path = Path("reports/ai_summary.json")
          if not summary_path.exists():
              print("No ai_summary.json found — skipping ENV_ISSUE report.")
              sys.exit(0)

          data      = json.loads(summary_path.read_text())
          env_issues = data.get("env_issues", [])

          if not env_issues:
              print("No ENV_ISSUE failures detected.")
              sys.exit(0)

          # Write to GitHub Step Summary
          step_summary = None
          try:
              import os
              step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          except Exception:
              pass

          report_lines = [
              "## Environment Issues Detected\n",
              "> These failures could **not** be auto-fixed. Manual remediation is required.\n",
              "",
          ]
          for ei in env_issues:
              report_lines.append(f"### `{ei.get('test_name', 'unknown')}`")
              report_lines.append(f"- **Error:** `{ei.get('error_message', '')[:200]}`")
              report_lines.append(f"- **Remediation:** {ei.get('remediation_hint', '')}")
              report_lines.append("")

          report_text = "\n".join(report_lines)
          print(report_text)

          if step_summary:
              with open(step_summary, "a") as f:
                  f.write(report_text + "\n")
          EOF

      # ── Upload Artifacts & Final Check ──────────────────────────────────────
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports-${{ github.run_id }}
          path: reports/